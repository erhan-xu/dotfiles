# === Prefix ===
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# === General ===
set -s escape-time 0
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g default-terminal "tmux-256color"
set -as terminal-features ",*256col*:RGB"

# === Vi mode ===
set -g mode-keys vi
set -g status-keys emacs

# === Pane navigation (Alt-hjkl) ===
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# === Pane resize (Alt-HJKL) ===
bind -n M-H resize-pane -L 3
bind -n M-J resize-pane -D 3
bind -n M-K resize-pane -U 3
bind -n M-L resize-pane -R 3

# === Window navigation (Alt-1~9) ===
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# === Window management ===
bind -n M-o new-window -c "#{pane_current_path}"
bind -n M-Q kill-pane
bind -n M-f resize-pane -Z

# === Splits (prefix + hjkl, direction = where new pane appears) ===
bind k split-window -vb -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"
bind h split-window -hb -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"

# === Copy mode ===
bind -n M-v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# === Reload ===
bind r source-file ~/.config/tmux/tmux.conf \; display 'Config reloaded'

# === Session switching (F1~F5) ===
bind -n F1 run-shell -b "~/.config/tmux/scripts/switch_session_by_index.sh 1"
bind -n F2 run-shell -b "~/.config/tmux/scripts/switch_session_by_index.sh 2"
bind -n F3 run-shell -b "~/.config/tmux/scripts/switch_session_by_index.sh 3"
bind -n F4 run-shell -b "~/.config/tmux/scripts/switch_session_by_index.sh 4"
bind -n F5 run-shell -b "~/.config/tmux/scripts/switch_session_by_index.sh 5"

# === Session management ===
bind . command-prompt -p "Rename session:" "run-shell \"~/.config/tmux/scripts/rename_session_prompt.sh '%%'\""
bind < run-shell "~/.config/tmux/scripts/move_session.sh left"
bind > run-shell "~/.config/tmux/scripts/move_session.sh right"

# === Session hooks (auto-renumber) ===
set-hook -gu session-created
set-hook -g session-created 'run -b "~/.config/tmux/scripts/session_created.sh"'
set-hook -ag session-created 'run -b "tmux refresh-client -S"'
set-hook -gu session-renamed
set-hook -g session-renamed 'run -b "tmux refresh-client -S"'
set-hook -gu session-closed
set-hook -g session-closed 'run -b "tmux refresh-client -S"'
run-shell "~/.config/tmux/scripts/session_created.sh"

# === Watch pane (Alt-w toggle, Alt-b manual unread) ===
bind -n M-w run-shell -b 'val=$(tmux show -wv @watching 2>/dev/null); if [ "$val" = "1" ]; then tmux set -wu @watching; tmux refresh-client -S; else ~/.config/tmux/scripts/watch_pane.sh "#{pane_id}" "#{window_id}"; fi'
bind -n M-b run-shell 'val=$(tmux show -wv @unread 2>/dev/null); if [ "$val" = "1" ]; then tmux set -wu @unread; else tmux set -w @unread 1; fi; tmux refresh-client -S'

# Clear unread on focus
set-hook -gu pane-focus-in
set-hook -g pane-focus-in 'run -b "tmux set -wu -t #{window_id} @unread 2>/dev/null || true"'
set-hook -ag pane-focus-in 'run -b "tmux refresh-client -S"'

# === Window status format (with notification icons) ===
setw -g window-status-format '#[fg=#c5c8c6] #I:#W#{?#{@unread},🔔,}#{?#{@watching},⏳,} '
setw -g window-status-current-format '#[fg=cyan,bold] #I:#W#{?#{@unread},🔔,}#{?#{@watching},⏳,} '

# === TPM ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-save-interval '5'
run '~/.tmux/plugins/tpm/tpm'
